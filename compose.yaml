services:
  postgres:
    image: postgres:16
    container_name: human-engine-postgres
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    container_name: human-engine-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  backend:
    build: ./backend
    container_name: human-engine-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_started
    env_file:
      - .env
    ports:
      - "8000:8000"

  worker:
    build: ./backend
    container_name: human-engine-worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_started
    env_file:
      - .env
    command: python -m backend.worker
 
  telegram-bot:
    build: ./backend
    container_name: human-engine-telegram-bot
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    env_file:
      - .env
    command: python -m backend.bot
volumes:
  postgres_data:
  ollama_data:
