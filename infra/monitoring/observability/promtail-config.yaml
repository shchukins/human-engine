server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /var/lib/promtail/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker

    static_configs:
      - targets:
          - localhost
        labels:
          job: docker
          __path__: /var/lib/docker/containers/*/*-json.log

    pipeline_stages:
      - docker: {}

      - match:
          selector: '{job="docker"}'
          stages:
            - json:
                expressions:
                  timestamp:
                  level:
                  service:
                  event:
                  message:
                  user_id:
                  job_id:
                  activity_id:
                  request_id:
                  path:
                  method:
                  status_code:
                  duration_ms:

            - labels:
                service:
                event:
                level: